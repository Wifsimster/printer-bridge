<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="light dark" />
    <meta name="theme-color" media="(prefers-color-scheme: light)" content="#f5f7fb" />
    <meta name="theme-color" media="(prefers-color-scheme: dark)" content="#0a0f1f" />
    <title>printcast</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
    />
    <script>
      // Apply theme as early as possible to avoid a flash.
      (function () {
        try {
          var saved = localStorage.getItem("printcast-theme");
          var prefersDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
          var dark = saved === "dark" || ((!saved || saved === "system") && prefersDark);
          if (dark) document.documentElement.classList.add("dark");
          document.documentElement.style.colorScheme = dark ? "dark" : "light";
        } catch (e) {}
      })();
    </script>
  </head>
  <body class="bg-background text-foreground antialiased">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
